<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
   <link rel="stylesheet" href="style/style.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
     <h2 class="title">Job Application Tracker</h2>

  <!-- Dashboard -->
   
  <div class="dashboard">
    <div class="dash-card">
      <p>Total</p>
      <h3 id="total">8</h3>
    </div>
    <div class="dash-card">
  <p>Interview</p>
  <h3 id="interviewCount">0</h3>
</div>

<div class="dash-card">
  <p>Rejected</p>
  <h3 id="rejectedCount">0</h3>
</div>
  </div>

  <!-- Available Jobs Section -->

  <div class="jobs-section">

    <div class="section-header">
      <h3>Available Jobs</h3>
      <span id="jobCount">8 Jobs</span>
    </div>

    <div class="tabs">
      <button onclick="changeTab('all')" class="active" id="allTab">All</button>
      <button onclick="changeTab('interview')" id="interviewTab">Interview</button>
      <button onclick="changeTab('rejected')" id="rejectedTab">Rejected</button>
     
    </div>
    </div> 

    <div id="jobsContainer">

    </div>
 
<script src="script.js"></script>


</body>
</html>
